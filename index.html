<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago Seguro</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f3ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(108,71,255,0.12);
      max-width: 420px;
      width: 100%;
    }
    h2 { color: #1a1033; font-size: 22px; margin-bottom: 8px; }
    .amount { color: #6c47ff; font-size: 32px; font-weight: 700; margin-bottom: 24px; }
    #payment-element { margin-bottom: 24px; }
    button {
      background: #6c47ff;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4b2fcc; }
    button:disabled { background: #a094d8; cursor: not-allowed; }
    #error-message {
      color: #dc2626;
      font-size: 14px;
      margin-top: 12px;
      padding: 10px;
      background: #fef2f2;
      border-radius: 8px;
      display: none;
    }
    #success-message {
      color: #059669;
      font-size: 15px;
      margin-top: 12px;
      padding: 12px;
      background: #ecfdf5;
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .lock-icon { font-size: 12px; color: #6b7280; text-align: center; margin-top: 16px; }
    #loading {
      text-align: center;
      padding: 40px 0;
      color: #6b7280;
      font-size: 14px;
    }
    #form-container { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Pago Seguro &#128274;</h2>
    <div class="amount" id="amount-display">$0.00</div>

    <div id="loading">Cargando formulario de pago...</div>

    <div id="form-container">
      <div id="payment-element"></div>
      <button id="submit-btn">Pagar ahora</button>
      <div id="error-message"></div>
      <div id="success-message">&#9989; &#161;Pago exitoso! Gracias por tu compra.</div>
      <p class="lock-icon">&#128274; Pago procesado con Stripe. Tus datos estan seguros.</p>
    </div>
  </div>

  <script>
    const STRIPE_PK = 'pk_test_51LLPZSAyqyVgaUlbXbj2SLEI5GSm4ja4tiz7mJB2gUokpRMQOJx2BeUqpTYp5xE5uwXd3PEjDcwjFi0NwME9hRgE005Ajk8wNW';
    const stripe = Stripe(STRIPE_PK);

    // Leer parametros de la URL
    const params = new URLSearchParams(window.location.search);
    const clientSecret = params.get('client_secret');
    const amount       = params.get('amount');
    const currency     = params.get('currency') || 'usd';

    // Mostrar monto formateado
    if (amount) {
      document.getElementById('amount-display').textContent =
        new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' })
          .format(parseInt(amount));
    }

    // Verificar que llego el clientSecret
    if (!clientSecret) {
      document.getElementById('loading').textContent =
        'Error: no se recibio el client_secret. Vuelve a intentarlo.';
    } else {
      // Inicializar Stripe Elements
      const elements = stripe.elements({ clientSecret });
      const paymentElement = elements.create('payment');

      paymentElement.on('ready', () => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
      });

      paymentElement.mount('#payment-element');

      // Manejar envio del formulario
      document.getElementById('submit-btn').addEventListener('click', async () => {
        const btn    = document.getElementById('submit-btn');
        const errDiv = document.getElementById('error-message');

        btn.disabled = true;
        btn.textContent = 'Procesando...';
        errDiv.style.display = 'none';

        const { error } = await stripe.confirmPayment({
          elements,
          confirmParams: { return_url: window.location.href },
          redirect: 'if_required'
        });

        if (error) {
          errDiv.textContent = error.message;
          errDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Pagar ahora';
        } else {
          // Pago exitoso
          document.getElementById('success-message').style.display = 'block';
          btn.style.display = 'none';

          // Notificar a FlutterFlow
          window.parent.postMessage({ type: 'PAYMENT_SUCCESS', clientSecret }, '*');
          if (window.flutter_inappwebview) {
            window.flutter_inappwebview.callHandler('paymentSuccess', { clientSecret });
          }
        }
      });
    }
  </script>
</body>
</html>
